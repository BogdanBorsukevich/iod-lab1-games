<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Експертне Опитування | ТОП-3 Ігри</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --success: #10b981; 
            --info: #0ea5e9; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --border: #334155;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            min-height: 100vh;
        }

        nav {
            background: rgba(30, 41, 59, 0.9);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        nav a { color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer; font-size: 14px; }
        nav a:hover { color: var(--primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            max-width: 500px; 
            margin: 40px auto; 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--border);
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }

        .admin-dashboard { 
            max-width: 1200px; 
            margin: 40px auto; 
            animation: fadeIn 0.5s ease-out;
            padding: 0 20px;
        }

        h1, h2, h3 { text-align: center; margin: 0; color: #ffffff; }
        h1 { font-weight: 800; font-size: 28px; text-transform: uppercase; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 30px; }

        input, select { 
            width: 100%; padding: 14px; margin: 10px 0 20px 0; 
            background: #0f172a; border: 1px solid var(--border); 
            color: white; border-radius: 8px; font-size: 15px; font-family: inherit;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; }

        button { 
            width: 100%; padding: 14px; background: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .btn-small { width: auto; padding: 8px 16px; font-size: 12px; border-radius: 6px; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #334155; color: white; border: 1px solid var(--border); }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .panel-header h2 { text-align: left; font-size: 20px; margin: 0; }

        .admin-panel { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
        
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; min-width: 500px; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #0f172a; color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        .text-right { text-align: right; }

        .role-badge { 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: bold; 
            background: #0f172a; 
            color: white; 
            border: 1px solid var(--border);
            width: auto;
            margin: 0;
            cursor: pointer;
        }
        .role-badge:focus { border-color: var(--primary); }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 40px 0; height: 200px; }
        .step { width: 120px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px 12px 0 0; text-align: center; padding-bottom: 15px; }
        .s1 { height: 180px; border-color: var(--warning); order: 2; box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        .s2 { height: 140px; border-color: var(--info); order: 1; }
        .s3 { height: 100px; border-color: var(--success); order: 3; }

        .hidden { display: none !important; }
        .rank-1 { color: var(--success); }
        .rank-2 { color: var(--info); }
        .rank-3 { color: var(--warning); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav id="main-nav" class="hidden">
    <a onclick="tab('vote-section')">🗳 Голосувати</a>
    <a onclick="tab('podium-section')">🏆 Рейтинг</a>
    <a id="nav-admin" class="hidden" onclick="tab('results-section')">⚙ Адмін-панель</a>
    <a onclick="logout()">🚪 Вийти</a>
</nav>

<div class="container" id="auth-section">
    <h1>Вхід</h1>
    <div class="subtitle">Експертне ранжування відеоігор 🎮</div>
    <input type="text" id="username" placeholder="Логін">
    <input type="password" id="password" placeholder="Пароль">
    <div id="pib-container" class="hidden"><input type="text" id="pib" placeholder="Прізвище, Ім'я"></div>
    <button onclick="handleAuth()">Увійти</button>
    <a onclick="toggleAuthMode()" style="display:block; text-align:center; margin-top:20px; cursor:pointer; color:var(--info);">Реєстрація</a>
    <div id="auth-msg" class="msg-box hidden"></div>
</div>

<div class="container hidden section" id="vote-section">
    <h1>Голосування</h1>
    <div class="subtitle" id="user-info"></div>
    <label class="rank-1">🥇 1 Місце (3 бали)</label><select id="vote-1"></select>
    <label class="rank-2">🥈 2 Місце (2 бали)</label><select id="vote-2"></select>
    <label class="rank-3">🥉 3 Місце (1 бал)</label><select id="vote-3"></select>
    <button onclick="submitVote()">Підтвердити вибір</button>
    <div id="vote-msg" class="msg-box hidden"></div>
</div>

<div class="container hidden section" id="podium-section" style="max-width: 800px;">
    <h1>🏆 Лідери голосування</h1>
    <div class="podium">
        <div class="step s2"><small>🥈 2 місце</small><div id="p2" style="font-weight: 800; font-size: 14px;"></div></div>
        <div class="step s1"><small>🥇 1 місце</small><div id="p1" style="font-weight: 800; font-size: 16px;"></div></div>
        <div class="step s3"><small>🥉 3 місце</small><div id="p3" style="font-weight: 800; font-size: 14px;"></div></div>
    </div>
    <h3>Повний рейтинг</h3>
    <div class="table-container">
        <table><thead><tr><th>#</th><th>Гра</th><th class="text-right">Бали</th></tr></thead><tbody id="full-ranking"></tbody></table>
    </div>
</div>

<div class="admin-dashboard hidden section" id="results-section">
    <div class="admin-panel" style="max-width: 900px; margin: 0 auto 30px auto;">
        <div class="panel-header">
            <h2>👥 Користувачі</h2>
            <button class="btn-small btn-secondary" onclick="loadUsers()">🔄 Оновити</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Логін</th>
                        <th>Роль</th>
                        <th class="text-right">Дії</th>
                    </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="grid-container">
        <div class="admin-panel">
            <div class="panel-header">
                <h2>📊 Протокол</h2>
                <button class="btn-small btn-secondary" onclick="loadProtocol()">🔄 Оновити</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Експерт</th>
                            <th>1</th>
                            <th>2</th>
                            <th>3</th>
                            <th class="text-right">Дія</th>
                        </tr>
                    </thead>
                    <tbody id="protocol-table-body"></tbody>
                </table>
            </div>
        </div>
        <div class="admin-panel">
            <div class="panel-header">
                <h2>⏱ Історія</h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-small btn-danger" onclick="clearHistory()">🗑 Очистити</button>
                    <button class="btn-small btn-secondary" onclick="loadHistory()">🔄 Оновити</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Час</th>
                            <th>uID</th>
                            <th class="text-right">Дія</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let isLoginMode = true;

    window.onload = () => {
        const saved = localStorage.getItem('expertUserSession');
        if (saved) { currentUser = JSON.parse(saved); start(); }
    };

    function start() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-nav').classList.remove('hidden');
        if (currentUser.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
        tab('podium-section');
    }

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'podium-section') loadResults();
        if(id === 'results-section') { loadUsers(); loadProtocol(); loadHistory(); }
        if(id === 'vote-section') loadGames();
    }

    function logout() { localStorage.removeItem('expertUserSession'); window.location.reload(); }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.querySelector('#auth-section h1').innerText = isLoginMode ? 'Вхід' : 'Реєстрація';
        document.getElementById('pib-container').classList.toggle('hidden', isLoginMode);
    }

    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const pib = document.getElementById('pib').value.trim();
        if(!username || !password) return alert('Заповніть поля');
        const res = await fetch(isLoginMode ? '/api/login' : '/api/register', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, pib})
        });
        const data = await res.json();
        if(data.success) {
            if(!isLoginMode) { alert('Успішно! Тепер увійдіть.'); toggleAuthMode(); return; }
            currentUser = data.user;
            localStorage.setItem('expertUserSession', JSON.stringify(currentUser));
            start();
        } else alert(data.error);
    }

    async function loadGames() {
        const res = await fetch('/api/games');
        const games = await res.json();
        ['vote-1', 'vote-2', 'vote-3'].forEach(id => {
            document.getElementById(id).innerHTML = '<option value="">-- Оберіть --</option>' + 
                games.map(g => `<option value="${g.id}">${g.title}</option>`).join('');
        });
        document.getElementById('user-info').innerText = `Експерт: ${currentUser.username}`;
    }

    async function submitVote() {
        const v = [document.getElementById('vote-1').value, document.getElementById('vote-2').value, document.getElementById('vote-3').value];
        if(!v[0] || !v[1] || !v[2] || v[0]===v[1] || v[0]===v[2]) return alert('Оберіть 3 різні гри!');
        const res = await fetch('/api/vote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: currentUser.id, votes: [{gameId:v[0], priority:1},{gameId:v[1], priority:2},{gameId:v[2], priority:3}]}) });
        if((await res.json()).success) tab('podium-section'); else alert('Помилка');
    }

    async function loadResults() {
        const res = await fetch('/api/results');
        const d = await res.json();
        document.getElementById('p1').innerText = d[0]?.title || '---';
        document.getElementById('p2').innerText = d[1]?.title || '---';
        document.getElementById('p3').innerText = d[2]?.title || '---';
        document.getElementById('full-ranking').innerHTML = d.map((g, i) => `<tr><td>${i+1}</td><td><b>${g.title}</b></td><td class="text-right">${g.score}</td></tr>`).join('');
    }

    async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();
        document.getElementById('users-table-body').innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td><b>${u.username}</b></td>
                <td>
                    <select class="role-badge" onchange="changeRole(${u.id}, this.value)">
                        <option value="expert" ${u.role === 'expert' ? 'selected' : ''}>Expert</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                    </select>
                </td>
                <td class="text-right"><button class="btn-small btn-danger" onclick="delUser(${u.id})">Видалити</button></td>
            </tr>`).join('');
    }

    async function changeRole(id, role) {
        await fetch(`/api/users/${id}/role`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({role}) });
        if (id === currentUser.id && role === 'expert') logout();
    }

    async function delUser(id) { if(confirm('Видалити?')) { await fetch(`/api/users/${id}`, {method:'DELETE'}); loadUsers(); loadProtocol(); loadHistory(); } }
    
    async function loadProtocol() {
        const res = await fetch('/api/protocol');
        const d = await res.json();
        document.getElementById('protocol-table-body').innerHTML = d.map(p => `<tr><td>${p.username}</td><td>${p.first_place || '-'}</td><td>${p.second_place || '-'}</td><td>${p.third_place || '-'}</td><td class="text-right"><button class="btn-small btn-danger" onclick="resetVote(${p.id})">Скинути</button></td></tr>`).join('');
    }
    
    async function resetVote(id) { await fetch(`/api/votes/${id}`, {method:'DELETE'}); loadProtocol(); }
    
    async function loadHistory() {
        const res = await fetch('/api/history');
        const data = await res.json();
        document.getElementById('history-table-body').innerHTML = data.map(h => `<tr><td>${new Date(h.created_at).toLocaleTimeString()}</td><td>${h.user_id}</td><td class="text-right">${h.action_text}</td></tr>`).join('');
    }
    
    async function clearHistory() { if(confirm('Очистити?')) { await fetch('/api/history', {method:'DELETE'}); loadHistory(); } }
</script>
</body>
</html>
